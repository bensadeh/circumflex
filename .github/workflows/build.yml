name: Build and Test

on:
  push:
    branches: [main]
  pull_request:

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Lint
        uses: golangci/golangci-lint-action@v7

      - name: Check formatting
        run: golangci-lint fmt --diff ./...

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -race -v ./...

      # Regenerate the Go-generated artifacts (completions, example files)
      # and fail on any difference, so they cannot drift from their sources.
      # The man page is excluded: asciidoctor output varies between versions,
      # so byte-comparing it would tie CI to the maintainer's local install.
      - name: Check generated files are current
        run: |
          bash share/completions/generate_completions.sh
          go run ./cmd/gen-theme-example theme.toml.example
          go run ./cmd/gen-config-example config.toml.example
          git diff --exit-code

      # The man page content isn't byte-checked (see above), but its version
      # stamp must match the source so a version bump can't ship a stale page.
      - name: Check man page version
        run: |
          version=$(go run ./cmd/clx --version | awk '{print $NF}')
          grep -qF "Source: circumflex $version" share/man/clx.1 || {
            echo "share/man/clx.1 is stamped with a different version than $version" >&2
            echo "run share/generate_all.sh and commit the result" >&2
            exit 1
          }
