name: Build and Test

on:
  push:
    branches: [main]
  pull_request:

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Lint
        uses: golangci/golangci-lint-action@v7

      - name: Check formatting
        run: golangci-lint fmt --diff ./...

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -race -v ./...

      # Regenerate the man page, completions and example files and fail on
      # any difference, so the committed artifacts cannot drift from their
      # sources. The two -I patterns skip the date asciidoctor stamps into
      # the man page; the version is still guarded by its Source line.
      - name: Check generated files are current
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq asciidoctor
          bash share/generate_all.sh
          git diff --exit-code -I'^\.\\"      Date: ' -I'^\.TH "CLX" "1" '