version: 2
before:
  hooks:
    - go mod download
builds:
  - main: ./cmd/clx
    binary: clx
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
archives:
  - files:
      - share/man/clx.1
      - share/completions/clx.bash
      - share/completions/_clx
      - share/completions/clx.fish
checksum:
  name_template: 'checksums.txt'
